<script> 
const popup = document.getElementById("popupOverlay");
const closePopup = document.getElementById("closePopup");
const infoBtn = document.getElementById("infoBtn");

const STORAGE_KEY = "tashAppPopupSeen";

// אם זו הפעם הראשונה
window.addEventListener("load", () => {

    if (!localStorage.getItem(STORAGE_KEY)) {

        popup.classList.add("show");

        localStorage.setItem(STORAGE_KEY, "true");
    }

});

const resources = [

{
    title:"הוצאות חינוך לילד בעל מוגבולות",
    type:"link",
    link:"https://mofet-frontend.wiz.digital.idf.il/m/L6H262UM86"
},

{
    title:"בני משפחה גרעינית מורחבתת",
    type:"link",
    link:"https://mofet-frontend.wiz.digital.idf.il/m/YK6LC2WVNK"
},

{
    title:"רמב\"י",
    type:"link",
    link:"https://mofet-frontend.wiz.digital.idf.il/m/G3AMEZAVQR"
},

{
    title:"אובדן ציוד אישי",
    type:"link",
    link:"https://mofet-frontend.wiz.digital.idf.il/m/TYN6AWJGW8"
},

{
    title:"היתר עבודה פרטית",
    type:"link",
    link:"https://mofet-frontend.wiz.digital.idf.il/m/8TX4SA83PT"
},
{
    title:"הובלות",
    type:"link",
    link:"https://mofet-frontend.wiz.digital.idf.il/m/KULKM7NT9R"
},
{
    title:"שכר דירה",
    type:"link",
    link:"https://mofet-frontend.wiz.digital.idf.il/m/STLMXA8D3Y"
},
{
    title:"הורה לילד בעל מוגבלות",
    type:"link",
    link:"https://mofet-frontend.wiz.digital.idf.il/m/276UZGUNLB"
},
{
    title:"סימולטור שכר דירה",
    type:"link",
    link:"https://mofet-frontend.wiz.digital.idf.il/urlexpired.aspx"
},
{
    title:"סמוכים לשולחן",
    type:"link",
    link:"https://mofet-frontend.wiz.digital.idf.il/m/NRQW4K7LSY"
},
{
    title:"החזרי גני ילדים",
    type:"image",
    link:"assets/keva/ganim.jpeg"
},
{
    title:"החזרי קייטנות",
    type:"image",
    link:"assets/keva/keytana.jpeg"
},
{
    title:"החזרי הוצאות",
    type:"document",
    link:"assets/keva/החזר הוצאות למשרתי קבע 2026 - חטיבת ביסל״ח.pdf"
},
{
    title:"מעטפת החייל הבודד בישרות קבע",
    type:"document",
    link:"assets/keva/מדיניות - מעטפת החייל הבודד בשירות קבע.pdf"
},
];



const container = document.getElementById("resourcesContainer");


resources.forEach((item)=>{

    const btn=document.createElement("button");

    btn.innerHTML=item.title;


    btn.onclick=()=>{

        openResource(item);

    };


    container.appendChild(btn);

});



function openResource(item){


    if(item.type==="link"){

        window.open(item.link,"_blank");

    }



    if(item.type==="document"){

        window.open(item.link,"_blank");

    }



    if(item.type==="image"){

        document.getElementById("imagePreview").src=item.link;

        document.getElementById("imagePopup")
        .classList.add("show");

    }

}
// סגירה
closePopup.onclick = () => {

    popup.classList.remove("show");

};

// לחיצה מחוץ לפופאפ
popup.onclick = (e)=>{

    if(e.target===popup){

        popup.classList.remove("show");
    }

};

// פתיחה ידנית
infoBtn.onclick = ()=>{

    popup.classList.add("show");

}; 
function menu() {   
        window.location.href = "menu.html";
}

function closeImage(){

document.getElementById("imagePopup")
.classList.remove("show");

}
</script>
