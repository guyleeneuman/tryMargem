<script>
       window.addEventListener("load", () => {
    const hasVisited = localStorage.getItem("infoSeen");

    if (!hasVisited) {
        infoPopup.classList.add("show");
        localStorage.setItem("infoSeen", "true");
    }
});
  const menuBtn =
    document.getElementById("menuBtn");

  const sideMenu =
    document.getElementById("sideMenu");

  const overlay =
    document.getElementById("overlay");

  menuBtn.addEventListener("click", () => {

    sideMenu.classList.toggle("active");

    overlay.classList.toggle("active");

    menuBtn.classList.toggle("active");

  });

  overlay.addEventListener("click", closeMenu);

  function closeMenu() {

    sideMenu.classList.remove("active");

    overlay.classList.remove("active");

    menuBtn.classList.remove("active");
  }

  const infoBtn = document.getElementById("infoBtn");
const infoPopup = document.getElementById("infoPopup");
const closeInfo = document.getElementById("closeInfo");

infoBtn.onclick = () => infoPopup.classList.add("show");

closeInfo.onclick = () => infoPopup.classList.remove("show");

infoPopup.onclick = e => {

    if (e.target === infoPopup) {

        infoPopup.classList.remove("show");
    }
};
const testsContainer = document.getElementById("testsContainer");

const popup = document.getElementById("detailsPopup");

const saveBtn = document.getElementById("saveDetails");
const closeDetails = document.getElementById("closeDetails");
const vehiclesContainer = document.getElementById("vehiclesContainer");
const nagmashBtn = document.getElementById("nagmashBtn");
const hummerBtn = document.getElementById("hummerBtn");
let selectedVehicle = "";
let selectedTest = "";
let selectedFile = "";

const tests = {
    nagmash: [
        {
            name: "קשת",
            file: "test.html"
        },
        {
            name: "פצמר אינרטי",
            file: "test.html"
        },
        {
            name: "עוקץ פלדה",
            file: "test.html"
        },
        {
            name: "נגמש",
            file: "test.html"
        },
        {
            name: "אלפא",
            file: "test.html"
        },
    ],

    hamer: [
        {
            name: "האמר",
            file: "test.html"
        },
        {
            name: "חנית",
            file: "test.html"
        },
        {
            name: "רגל עץ",
            file: "test.html"
        },
        {
            name: "פצמר אינרטי",
            file: "test.html"
        },
        {
            name: "עוקץ פלדה",
            file: "test.html"
        },
    ]
};

closeDetails.onclick = () => {
    popup.classList.remove("show");
};
function showTests(vehicle){

    selectedVehicle = vehicle;

    testsContainer.innerHTML = "";

    // מקטין את הכפתור שנבחר
    const selectedBtn =
        vehicle === "nagmash" ? nagmashBtn : hummerBtn;

    const otherBtn =
        vehicle === "nagmash" ? hummerBtn : nagmashBtn;

    selectedBtn.classList.add("selectedVehicle");
    otherBtn.style.display = "none";

    // כפתור חזרה
    const backBtn = document.createElement("button");
    backBtn.className = "backVehicleBtn";
    backBtn.innerText = "←";

    backBtn.onclick = () => {

        testsContainer.innerHTML = "";

        selectedBtn.classList.remove("selectedVehicle");
        otherBtn.style.display = "flex";

    };

    testsContainer.appendChild(backBtn);

    tests[vehicle].forEach(test=>{

        const btn = document.createElement("button");

        btn.className = "testBtn";
        btn.textContent = test.name;

        btn.onclick = ()=>{

            selectedTest = test.name;
            selectedFile = test.file;

            popup.classList.add("show");

        };

        testsContainer.appendChild(btn);

    });

}

document.getElementById("nagmashBtn").onclick = () => {
    showTests("nagmash");
};

document.getElementById("hummerBtn").onclick = () => {
    showTests("hamer");
};

saveBtn.onclick = () => {

    const fullName = document.getElementById("fullName").value.trim();
    const battalion = document.getElementById("battalion").value.trim();

    if (!fullName || !battalion) {
        alert("יש למלא את כל הפרטים");
        return;
    }


    sessionStorage.setItem("fullName", fullName);

    sessionStorage.setItem("battalion", battalion);

    sessionStorage.setItem("vehicle", selectedVehicle);

    sessionStorage.setItem("test", selectedTest);


    sessionStorage.setItem(
        "testId",
        selectedTest
    );


    popup.classList.remove("show");


    window.location.href = "test.html";

};
</script>


<div class="dots"></div>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;

    min-height: 100vh;

.selectedVehicle{

    justify-content: center;

}

.backVehicleBtn{

}

.backVehicleBtn:active{

}

  .title {
    top: 20vh;
    width: min(70vw, 320px);
  }

  /* ===== WRAPPER ===== */
  .cardsWrapper {
    margin-top: -50px;
    width: 100%;
  }

  /* ===== TRACK ===== */
  .cardsTrack {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding: 10px 10px;

    scrollbar-width: none;
  }

  .cardsTrack::-webkit-scrollbar {
    display: none;
  }

  /* ===== CARD ===== */
  .card {
    flex: 0 0 70vw;
    scroll-snap-align: center;

    background: #e7fdfea9;
    border-radius: 24px;
    padding: 10px;

    height: 55vh;

    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);

    opacity: 0.5;
    transform: scale(0.95);
    transition: 0.3s;
  }

  .card.active {
    opacity: 1;
    transform: scale(1);
  }

  .cardContent {
    height: 100%;
    overflow-y: auto;
    direction: rtl;
    color: #5d6940;
    font-size: 1.1rem;
  }

  /* ===== TITLE INSIDE CARD ===== */
  h2 {
    text-align: center;
    color: #304d2f;
    font-size: 1.4rem;
  }

  /* ===== DOTS ===== */
  .dots {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #bbb;
  }

  .dot.active {
    background: #222;
  }

  /* ===== MENU ===== */
  .menuBtn {
    position: fixed;
    top: 50px;
    right: 15px;
    width: 55px;
    height: 55px;
    background: none;
    border: none;
    z-index: 1100;
  }

  
  #sideMenu.active {
    right: 0;
  }


  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 1000;
  }

  #overlay.active {
    opacity: 1;
    pointer-events: all;
  }
#sideMenu a{

    from{
