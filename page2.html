<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>טעויות ירי</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <img class="navbar" src="assets/elements/logo.png" alt="icon 1">
  <img class="title" src="assets/elements/hobim.png" alt="icon 1">
<button id="infoBtn">
    ⓘ
</button>
    <div id="infoPopup" class="infoPopup">

    <div class="infoBox">

          <p>
לפניך מבחני הו"בים. בחר בנגמש / האמר ובמבחן הרלוונטי עבורך ובצע אותו.        </p>
                <button id="closeInfo">סגור</button>



    </div>

</div>
    <button id="menuBtn" class="menuBtn">

      <svg id="menuIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">

        <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />

      </svg>

    </button>

    <div id="overlay"></div>

    <nav id="sideMenu">

      <a href="index.html">דף הבית</a>

      <a href="page1.html">טעויות ירי</a>

      <a href="page2.html">מבחני הו"בים</a>

      <a href="page3.html">בד״חים</a>

      <a href="page4.html">צייר על המרגמה</a>

    </nav>

<section id="vehicleScreen"
class="screen">


<h1>
בחר כלי
</h1>



<div class="vehicleContainer">



<div class="vehicleCard"
onclick="selectVehicle('נגמש')">


<img src="assets/elements/nagmash.png">


<h2>
נגמ"ש
</h2>


</div>




<div class="vehicleCard"
onclick="selectVehicle('האמר')">


<img src="assets/elements/hummer.png">


<h2>
האמר
</h2>


</div>



</div>


</section>





<!-- ======================
בחירת נושא
======================= -->


<section id="topicScreen"
class="screen hidden">


<h1 id="vehicleTitle"></h1>


<div id="topicsContainer">

</div>


</section>





<!-- ======================
פרטים לפני מבחן
======================= -->


<section id="detailsScreen"
class="screen hidden">


<div class="formBox">


<h2>
פרטים לפני מבחן
</h2>


<input id="fullName"
placeholder="שם מלא">


<input id="battalion"
placeholder="מספר גדוד">


<button onclick="startTest()">

התחל מבחן

</button>


</div>


</section>





<!-- ======================
מבחן
======================= -->


<section id="testScreen"
class="screen hidden">


<div id="questionContainer">

</div>


<button id="nextBtn"
onclick="nextQuestion()">

הבא

</button>


</section>





<!-- ======================
תוצאה
======================= -->


<section id="resultScreen"
class="screen hidden">


<div class="resultBox">


<h1>
התוצאה שלך
</h1>


<h2 id="scoreText"></h2>


<button id="retryBtn">

מענה חוזר

</button>


</div>


</section>



<script>


// מידע

window.addEventListener("load",()=>{


let seen =
localStorage.getItem("hobimInfo");


if(!seen){

infoPopup.classList.add("show");

localStorage.setItem(
"hobimInfo",
"true"
);

}


});





// תפריט


const menuBtn =
document.getElementById("menuBtn");


const sideMenu =
document.getElementById("sideMenu");


const overlay =
document.getElementById("overlay");



menuBtn.onclick=()=>{


sideMenu.classList.toggle("active");

overlay.classList.toggle("active");


};



overlay.onclick=()=>{


sideMenu.classList.remove("active");

overlay.classList.remove("active");


};





// מידע


infoBtn.onclick=()=>{

infoPopup.classList.add("show");

};


closeInfo.onclick=()=>{

infoPopup.classList.remove("show");

};


infoPopup.onclick=e=>{

if(e.target==infoPopup)

infoPopup.classList.remove("show");


};





// =====================
// מערכת בחירה
// =====================


let selectedVehicle="";


let selectedTopic="";



const topics={


"נגמש":[

"בטיחות",
"טעינה",
"פריקה",
"ירי"

],


"האמר":[

"בטיחות",
"תפעול",
"נהיגה",
"ירי"

]


};




function selectVehicle(vehicle){


selectedVehicle=vehicle;


vehicleScreen.classList.add("hidden");


topicScreen.classList.remove("hidden");



vehicleTitle.innerHTML=
"מבחני "+vehicle;



let box=
document.getElementById(
"topicsContainer"
);


box.innerHTML="";



topics[vehicle].forEach(topic=>{


let btn=document.createElement("button");


btn.className="topicBtn";


btn.innerHTML=topic;



btn.onclick=()=>{


selectedTopic=topic;


topicScreen.classList.add("hidden");


detailsScreen.classList.remove("hidden");


};


box.appendChild(btn);



});



}



</script>

זה החלק הראשון.
</body>
<script>
       window.addEventListener("load", () => {
    const hasVisited = localStorage.getItem("infoSeen");

    if (!hasVisited) {
        infoPopup.classList.add("show");
        localStorage.setItem("infoSeen", "true");
    }
});
  const menuBtn =
    document.getElementById("menuBtn");

  const sideMenu =
    document.getElementById("sideMenu");

  const overlay =
    document.getElementById("overlay");

  menuBtn.addEventListener("click", () => {

    sideMenu.classList.toggle("active");

    overlay.classList.toggle("active");

    menuBtn.classList.toggle("active");

  });

  overlay.addEventListener("click", closeMenu);

  function closeMenu() {

    sideMenu.classList.remove("active");

    overlay.classList.remove("active");

    menuBtn.classList.remove("active");
  }

  const infoBtn = document.getElementById("infoBtn");
const infoPopup = document.getElementById("infoPopup");
const closeInfo = document.getElementById("closeInfo");

infoBtn.onclick = () => infoPopup.classList.add("show");

closeInfo.onclick = () => infoPopup.classList.remove("show");

infoPopup.onclick = e => {

    if (e.target === infoPopup) {

        infoPopup.classList.remove("show");
    }
};
</script>


<div class="dots"></div>
</body>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    overflow-x: hidden;
    margin: 0;
    min-height: 100vh;
    background-image: url("assets/backgrounds/bg1.png");
    background-size: 100vw 100vh;
    background-position: center;
    background-repeat: repeat-y;
    direction: rtl;
    font-family: "secular";

  }

  .header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 90px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
    z-index: 1000;
  }


  .title {
    top: 20vh;
    width: min(70vw, 320px);
  }

  /* ===== WRAPPER ===== */
  .cardsWrapper {
    margin-top: -50px;
    width: 100%;
  }

  /* ===== TRACK ===== */
  .cardsTrack {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding: 10px 10px;

    scrollbar-width: none;
  }

  .cardsTrack::-webkit-scrollbar {
    display: none;
  }

  /* ===== CARD ===== */
  .card {
    flex: 0 0 70vw;
    scroll-snap-align: center;

    background: #e7fdfea9;
    border-radius: 24px;
    padding: 10px;

    height: 55vh;

    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);

    opacity: 0.5;
    transform: scale(0.95);
    transition: 0.3s;
  }

  .card.active {
    opacity: 1;
    transform: scale(1);
  }

  .cardContent {
    height: 100%;
    overflow-y: auto;
    direction: rtl;
    color: #5d6940;
    font-size: 1.1rem;
  }

  /* ===== TITLE INSIDE CARD ===== */
  h2 {
    text-align: center;
    color: #304d2f;
    font-size: 1.4rem;
  }

  /* ===== DOTS ===== */
  .dots {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #bbb;
  }

  .dot.active {
    background: #222;
  }

  /* ===== MENU ===== */
  .menuBtn {
    position: fixed;
    top: 50px;
    right: 15px;
    width: 55px;
    height: 55px;
    background: none;
    border: none;
    z-index: 1100;
  }

  
  #sideMenu.active {
    right: 0;
  }


  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 1000;
  }

  #overlay.active {
    opacity: 1;
    pointer-events: all;
  }
#sideMenu a{

    text-decoration:none;

    color:#5d6940;

    font-size:1.8rem;

    font-weight: 580;

    padding:2vh 2vw;

    border-bottom:1px solid rgba(0,0,0,.08);

    transition:.25s;
}

  #sideMenu a:hover {

    background: #dce7d0;
  }

  :root {

    --menuColor: #EFFEFF;
    --menuOpenColor: #88b84d;

    --menuWidth: 55vw;

  }

  #sideMenu {

    position: fixed;

    top: 0;
    right: -100%;

    width: var(--menuWidth);

    height: 100vh;

    background: rgba(245, 250, 248, .95);

    backdrop-filter: blur(12px);

    border-radius: 30px 0 0 30px;

    display: flex;

    flex-direction: column;

    padding-top: 12vh;

    transition: .4s ease;

    z-index: 1000;
  }

  #sideMenu.active {

    right: 0;
  }

  
.infoBtn{
    position:fixed;
    top:92%;
    left:15px;
    width:28px;
    height:28px;
    border-radius:50%;
    border:none;
    background:#516b42;
    color:white;
    font-size:1.5rem;
    z-index:2000;
}

.infoPopup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:3000;
}

.infoPopup.show{
    display:flex;
}

.infoBox{
    background:#effeffc5;
    padding:10px;
    border-radius:20px;
    width:60%;
    max-width:300px;
    color: #516b42;
    text-align:center;
    font-size: 1.2rem;
    
}

#closeInfo{
      background:#effeffc5;
    padding:2px;
    border-radius:20px;
    width:60%;
    max-width:300px;
    color: #516b42;
    border: none;
    text-align:center;
     box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
    font-size: 1.8rem;
    font-weight: 600;
    font-family: secular;
}
</style>
</html>
