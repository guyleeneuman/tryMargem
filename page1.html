content:`
<p> תש בטאץ' הינה מערכת שמטרתה להנגיש לחייל את כלל המידע הדרוש לו ואת זכויותיו. בנוסף, החייל יוכל להיות בבקרה אחר תהליכים הפתוחים איתו במשרד תש. המערכת נמצאת בפלטפורמת צ 360 אליה ניתן להיכנס מהנייד / מהמחשב.
<ol>
    <li>מידע נרחב על בקשות: לחייל מופיע כלל המידע עבור בקשות שונות (קריטריונים להגשת הבקשה, מסמכים נדרשים, גורמים הבוחנים את הבקשה וכו).</li>
    <li>הנגשת עולם הת"ש: צפייה בבקשות מאושרות, בקשות אשר בתהליך, סטטוס טיפול בבקשות וכו.</li>
    <li>פירוט על מסמכים והעלאה למערכת: ישנן דוגמאות למסמכים השונים אשר החייל נדרש להביא לסגל הת"ש, סרטונים המראים לחייל איך ניתן להוציא את האישורים מאפליקציות הבנקים השונות וכו. החייל יכול לצפות בהסברים ולהעלות את המסמכים הנדרשים עבור כל בקשה הנפתחת עבורו.</li>
    <li>התראות לחייל בכל שינוי: התראה לחייל כאשר הבקשה מגיעה ליום ה30. התראה במידה וסטטוס הבקשה השתנה (אושר/נדחה/נסגר עקב חוסר שיתוף פעולה).</li>
    <li>קבלת מסמכים מאוחדים: התממשקות למערכת "אנשים" של כלל המסמכים שהחייל מעלה לכל פעילות כמסמך PDF מאוחד.</li>

    <li>שאלון התאמה לבקשות: במידה והחייל אינו יודע מה היא הבקשה המתאימה עבורו למצוקה הקיימת, הוא יכול למלא שאלון קצר. שאלון זה יועבר למשקית הרלוונטית וכך משקית התש תדע כי עליה לזמן את החייל לראיון קצר ולהחליט עימו אלו בקשות יפתחו עבורו.</li>
</ol>

            <li>אישוריים כלכליים של החייל והוריו (ריכוז יתרות, עובר ושב ופירוט כרטיסי אשראי)</li>
            <li>טופס החתמת מפקדים</li>
            </ol>
            <h2>מי אחראי לאשר לי את הבקשה</h2>
            <p>ת"א חובה במופת</p>

`
},

{
title:"הקלות בתנאי השירות- התש",
content:`
<p>מתן מענה לצורכי משפחתו של החייל המחייבים את נוכחותו בבית לאור נסיבות סוציאליות/רפואיות/אישיות, זאת על מנת שהחייל יכול לסעוד קרוב משפחתו הזקוק לעזרה. ישנן אוכלוסיות הזכאיות להטבה זו באופן מובנה/מטכ"לי.</p>
<h1>הקלות בתנאי שירות עבור קרוב מדרגה ראשונה/שנייה של החייל- סוציאלי/רפואי</h1>
<p>חייל אשר קרוב משפחתו נזקק לסיוע של החייל לתפקוד היום-יום או שקיימות בביתו בעיות סוציו-אקונומיות. ההטבה מקנה לחייל מספר לילות בשבוע בהם ישהה בביתו. תוקף הזכאות הינו עד לתאריך תום השירות.</p>
<h2>אישורים נדרשים</h2>
<ol>
    <li>פק"ל רפואי חתום וטופס ויתור סודיות של המוטב</li>
    <li>אישורים רפואיים של המוטב- הת"ש רפואי</li>
    <li>אישורים כלכליים(ריכוז יתרות, עובר ושב, פירוט כרטיסי אשראי, הלוואות ועיקולים, אישורי חובות וכו) של החייל והוריו- הת"ש כלכלי</li>
    <li>מכתב אישי של החייל</li>
    <li>ביקור בית אשר יבוצע על ידי משקית ת"ש האישית</li>
    <li>טופס בקשה הכולל החתמות של הגורמים- משקית ת"ש, החייל, מפקדו של החייל,רופא יחידה, מפקד יחידה בדרגת סא"ל ולאחר מכן מפקד יחידה בדרגת אל"מ</li>
    </ol>
    <h2>מי אחראי לאשר לי את הבקשה</h2>
    <p>אחרי שהמפקדים ביחידתי הוחתמו,הבקשה תעבור להחתמת מח"ט. לאחר מכן לסמכות התגבורת- גוף שאחראי לבחון את בקשות הת"ש והוא הגורם שיחליט האם הבקשה מאושרת/לא מאושרת.</p>
    <h1>זכאות בהת"ש ללא צורך באישורים</h1>
    <p><strong>הת"ש 3-</strong>משפחה שכולה, פטירה טרייה, אחים/בנים של נכה צה"ל 100%, נשוי אב לילד, שומרני, קראי, העבריים מדימונה, קהילת בית אל.</p>
    <p><strong>הת"ש 1-</strong>חייל שהינו בן זכר יחיד ועונה על אחת מן ההגדרות הבאות: בן העדה הדרוזית, בן העדה הצ'רקסית, בעל דת "מוסלמי",בעל דת "בדואי".</p>
    <p><strong>פטירת קרוב מדרגה ראשונה-</strong>חייל אשר קרוב משפחתו מדרגה ראשונה נפטר שלא במסגרת צבאית/פעילות איבה יהיה זכאי להת"ש 3, עד 5 שנים מפטירת הקרוב ללא שיקול דעת המפקד. לאחר 5 שנים מיום פטירת הקרוב, החייל יהיה רשאי להגיש בקשה להת"ש לאור נסיבות אישיות בצירוף מכתב אישי ובקשה זו תבחן בהתאם לשיקול דעת המפקד וצורכי החייל.</p>
    
`
},

{
title:"חייל בודד",
content:`
<h1>חייל בודד מובהק</h1>
<p><strong>חייל יתום-</strong>חייל שהתיתם משני הוריו.</p>
<h2>אישורים נדרשים</h2>
<p>טמפלט פטירה מסגל הת"ש</p>
<p><strong>חייל שעלה בגפו-</strong>חייל שעלה לארץ בגפו והוריו מתגוררים בחו"ל כדרך קבע. הטבה זו תינתן לחייל שהוריו עזבו את הארץ לפני הגיעו לגיל 1.</p>
<h2>אישורים נדרשים</h2>
<p>הצהרה לפתיחת בקשה,טמפלט אימות נתונים.</p>
<p><strong>בן יורדים-</strong>חייל שהוריו מתגוררים בחו"ל כדרך קבע (תקופה של חצי שנה לפחות) מאחר והגרו לחו"ל מטעמי עבודה או מטעמים אישיים.</p>
<h2>אישורים נדרשים</h2>
<p>הצהרה לפתיחת בקשה,טמפלט אימות נתונים, הצהרת ההורים בדבר עזיבת הארץ לשישה חודשים לפחות, לאיזו תקופת זמן וכוונתם לחזור לארץ.</p>
<p><strong>בן שליחים-</strong>חייל שהוריו יצאו לשליחות של חצי שנה או יותר ומועד חזרתם ידוע.</p>
<h2>אישורים נדרשים</h2>
<p>הצהרה לפתיחת בקשה, אישור מהמוסד השולח בו יצוינו תאריכי תחילת וסיום השליחות</p>
<h1>חייל חסר עורף משפחתי</h1>
<p>חייל אשר אינו מקיים קשר עם הוריו, דוגמאת קשיים הנובעים מבעיות רפואיות/נפשיות. חייל אשר אינו מתגורר בבית הוריו, בינו ובין התא המשפחתי מדרגה ראשונה קיימות מורכבות עד לכדי ניתוק קשר, ולא קיים עורף רגשי או כלכלי כלל. קיים נתק בלתי ניתן לגישור בינו לבין הוריו שאינו נובע משיקולי עצמאות של החייל.</p>
<h2>אישורים נדרשים</h2>
<ol>
    <li>הצהרה לפתיחת בקשה</li>
    <li>ריכוז יתרות של החייל</li>
    <li>עובר ושב 3 חודישם אחרונים של החייל</li>
    <li>פירוט כרטיסי אשראי 3 חודשים אחרונים של החייל</li>
    <li>5 דוחות שיחה המתבצעים על ידי סגל הת"ש- הודחות נדרשים לכלול שיח עם שני ההורים ועם שני גורמים אובייקטיבים לפחות</li>
    <li>ביקור בית משקית ת"ש</li>
    <li>דו"ח עובדת סוציאלית/משטרה/פנימייה/יועצת בית הספר/מחנכת/כל גורם מקצועי מוסמך במידה ויש.</li>
    <li>מכתב אישי של החייל</li>
    <li>כל אישור נוסף שיכול לשפוך אור על הנושא</li>
    <li>ראיון קצינת ת"ש יחידה</li>
    </ol>
<h1>הטבות החייל הבודד</h1>
<p>חיילים בודדים זכאים למעטפת רחבה על מנת לאפשר להם לבצע שירות תקין תוך התחשבות באתגרים הנצבים לבם.</p>
<h2>הטבות שכריות</h2>
<ol>
    <li>מענק חודשי בגובה 620.7 ש"ח הניתן כתוספת לשכר החודשי של החייל</li>
    <li>מענקים חודשיים בהתאם לאופי השירות: מענק רמת פעילות א+: 482.30 ש"ח. מענק רמת פעילות א': 241.30 ש"ח</li>
    </ol>
    <h2>פתרונות דיור</h2>
    <ol>
        <li>השתתפות בשכר דירה + הוצאות החזקת דירה: חייל בודד השוכר דירה באופן עצמאי יהיה זכאי בהחזרי שכר דירה בגובה 1800 ש"ח</li>
        <li>לינה בבית החייל- לינה באחד מ9 בתי החייל הפזורים ברחבי הארץ, כוללת מענה במזון, שירותי כביסה, משחקים בשעות הפנאי, ליווי אישי, חברתי ואירועים חברתיים</li>
        <li>אימוץ בקיבוץ- לינת חדר יחיד בקיבוץ *מיועד לחיילים המשרתים בבסיס סגור בלבדץ הלינה כוללת מענה במזון, שירותי כביסה וליווי על ידי משפחה מאמצת לאורך תקופת הלינה, בהתאם לרצון החייל</li>
        <li>דירת בית חם- לינה באחת מהדירות של האגודה למען החייל. הדירות מרוהטות ומאובזרות במוצרי חשמל. חייל הלן בפתרון דיור זה יהיה זכאי כל חודש לתווי קנייה בסך 400 ש"ח בחוגר לרכישת מוצרי מזון. לאורך כל תקופת המגורים ילווה החייל על ידי רכז מטעם האגודה למען החייל, הדירות מיועדות עבור 2 חיילים בחדר</li>
        <li>דירת בית חם ללוחמים בודדים- לינה באחת מדירות האגודה למען החייל, המאפשרות ללוחם לינה בחדר לבד עבור חיילים בודדים בלבד.</li>
</ol>
<h2>הטבות נלוות</h2>
<ol>
    <li>תווי קנייה-זכאות חודשית אוטומטית לתווי קנייה בסך 150 ש"ח בחוגר, עבור המתגורר בדירת האגודה למען החייל 400 ש"ח</li>
    <li>יום סידורים- זכאות ליום סידורים של 24 שעות אחת לחודש בהכשרה ראשונית ואחת לחודשיים בשירותו הסדיר, יום זה הינו על חשבון המערכת</li>
    <li>תווי חג- על סך 500 ש"ח בראש השנה ובפסח</li>
    <li>מימון טיסה- חייל בודד מובהק זכאי למימון טיסה מלא על ידי הצבא לטובת מימוש מיוחדת לביקור קרוב משפחה מדרגה ראשונה בחו"ל. הטבה זו תינתן לחייל פעם אחת בשירות ופעמיים עבור אוכלוסית הלוחמים. חייל בודד-בן שליחים אינו זכאי למימון טיסה</li>
    <li>הגעה מוקדמת הביתה- בימי שישי ישוחררו החיילים הבודדים באופן כזה שיגיעו לביתם עד השעה 10:00 לכל המאוחר. בחגי פסח וראש השנה ישוחררו יום לפני ערב החג עד השעה 17:30 לכל המאוחר</li>
    <li>דמי כלכלה בעת חופשת מחלה- חייל בודד הנמצא בחופשת מחלה/חופשה מיוחדת כלכלית בבית שאורכה מעל ל3 ימים יהיה זכאי לדמי כלכלה החל מהיום הראשון בו נמצא בבית במידה ואינו מתגורר בבית החיל. גובה דמי כלכלה ליום הוא 52.35 ש"ח</li>
    </ol>
    <h2>חופשות מיוחדות החייל הבודד></h2>
    <ol>
        <li>חופשה מיוחדת לביקור קרוב מדרגה ראשונה- חייל בודד מובהק זכאי ל30 ימים בכל שנת שירות עבור ביקור קרוב מדרגה ראשונה השוהה בחו"ל. חופשה זו הינה על חשבון המערכת ובטיפול משרד הת"ש</li>
        <li>חופשה מיוחדת להגעת קרוב מדרגה ראשונה לארץ- חייל בודד מובהק זכאי ל8 ימי חופשה בכל שנה לטובת הגעת קרוביו מדרגה ראשונה לארץ. חייל בהכשרה ראשונית/קורס זכאי ל4 ימי חופשה במהלך ההכשרה. חופשה זו הינה על חשבון המערכת וכוללת את ימי שישי ושבת</li>
        <li>חופשה לטובת מעבר דירה- חייל בודד שובר דירה יהיה זכאי לחופשה מיוחדת הת יומיים לטובת כל מעבר</li>
        </ol>
        <h2>אירוח בחגים</h2>
        <ol>
            <li>אירוח על ידי משפחות מארחות- מרכז הבודדים מקשר בין משפחות המעוניינות לארח בחגים לבין חיילים בודדים המעוניינים להתארח. באפשרות החייל לבחור איזור מועדף בארץ, אופי אירוח מותאם (חילוני,מסורתי,דתי)</li>
            <li>בתי מלון ברחבי הארץ-התאחדות בתי המלון בישראל תורמת לחיילים בודדים אירוח בביתי מלון ברחבי הארץ האירוח מתבצע על ידי חלוקת הקצאות ליחידות טרם ערב החג ומקנה לילה בבית מלון בערב החג לחייל. פתרון זה מותנה בתרומות המשתנות מידי חג</li>
            <li>אירוח בבית החייל- רשאים לבחור בהשתתפות בארוחות בבתי החייל בחגים בין אם מתגוררים בבית החייל באופן קבוע ובין אם לא</li>
            </ol>
            <h2>הטבות ממשרדי הממשלה</h2>
            <ol>
                <li>מענקים לחייל הבודד העולה- (יש לפנות למשרדים אלו לקבלת המענקים, אינם משולמים באופן אוטומטי). משרד הקליטה והעלייה-מענק חודשי בגובה 540 ש"ח, משרד הבינוי והשיכון-מענק חודשי בגובה 750 ש"ח</li>
                <li>הנחה בחברת החשמל- 50% הנחה על 400 קילווואט ראשונים - מתקבל אוטומטית בתנאי שמונה החשמל כתוב על שמו של החייל</li>
                <li>פטור מתשלום ארנונה מטעם העירייה-על החייל לגשת לעירייה ולהציג תעודת בודד וחוזה שכירות</li>
                <li>פטור מתשלום אגרות בהוצאת וחידוש דרכונים ממשרד האוכלוסין וההגירה</li>
</ol>
<h2>זכאות החייל הבודד והמשוחרר</h2>
<ol>
    <li>סדנאות הכנה לאזרחות-סדנה יעודית בת 4 ימים המתקיימת בטווח של עד 6 חודשים טרם מועד שחרור החייל במהלכה החייל יחשף לכלל זכויותיו והטבותיו כחייל בודד משוחרר. היום החמישי בשבוע הסדנה הינו יום סידורים אישי לחייל. בנוסף לימי הסידורים אליו הוא זכאי</li>
    <li>ראיון שחרור- יבוצע לחייל הבודד 3 חודשים טרם השחרור/ כניסתו לקבע על ידי משקית ת"ש</li>
<li>חודשי התארגנות- חייל בודד משוחרר/בשירות קבע יהיה זכאי ללינה עד שלושה חודשים למימוש בבית החייל מיום סיום שירות החובה</li>
<li>שכר דירה-חייל בודד משוחרר/בשירות קבע יהיה זכאי להשתתפות בהוצאות שכר דירה בגובה 1000 ש"ח אשר ישולם על ידי משרד הבטחון למשך 12 חודשים החל ממועד שחרורו/ כניסתו לקבע. בקשה זו נבחנת על ידי האגף והקרן לחיילים משוחררים במשרד הבטחון ויכנס ב2 פעימות כל פעימה כ6000 ש"ח סך הכל 12000 ש"ח</li>
<li>ליווי אישי מותאם- ליווי על ידי מדור בודדים הכולל שיח אישי עם כל חייל ומעבר על זכויותיו והטבותיו, חיבור החייל לעמותות וארגונים בהתאם לצרכיו והמשך ליווי ויצירת קשר עד כחצי שנה מהשחרור</li>
</ol>
<h2>ליווי אישי ועמותות</h2>
<p><strong>תכנית יתד-</strong>תכנית לאומית לצעירים מטעם המדינה והרווחה המקנה ליווי של עובדים סוציאליים אשר פזורים ברשויות המקומיות ומהווים כתובת לחיילים המשוחררים. תחומי סיוע: תהליך השתלבות באזרחות, מיצוי זכויות, מציאת פתרונות דיור, תעסוקה, הכנה לעולם, הכנה לעולם העבודה ותמיכה אישית.</p>
<p><strong>תכנית כנפיים-</strong>ליווי חיילים בודדים עולים חדשים באמצעות הנגשת זכויות והענקת כלים להשתלבות מיטבית בחברה וטיפול נפשי במידת הצורך. הליווי הינו עד 5 שנים מסיום השירות החובה. להמשך תקשורת 1-80030304</p>
