function openTopic(index){

    currentTopic = index;

    document.getElementById("topicTitle").innerHTML =
        topics[index].title;

    document.getElementById("topicContent").innerHTML =
        topics[index][currentDevice];

    document.getElementById("topicPopup")
        .classList.add("show");
}
function changeDevice(device){

    currentDevice = device;

    document
        .getElementById("pcBtn")
        .classList.toggle("active", device === "pc");

    document
        .getElementById("phoneBtn")
        .classList.toggle("active", device === "phone");

    // עדכון הטקסט
    document.getElementById("topicContent").innerHTML =
        topics[currentTopic][currentDevice];
}



function closeTopic(){

    document.getElementById("topicPopup")
    .classList.remove("show");

} 
// סגירה
closePopup.onclick = () => {

    popup.classList.remove("show");

};

// לחיצה מחוץ לפופאפ
popup.onclick = (e)=>{

    if(e.target===popup){

        popup.classList.remove("show");
    }

};

// פתיחה ידנית
infoBtn.onclick = ()=>{

    popup.classList.add("show");

};
