<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="index.css">
</head>

<body>
  <img class="navbar" src="assets/elements/logo.png" alt="icon 1">
  <img class="title" src="assets/elements/badahim.png" alt="icon 1">
 
 <div id="categoryScreen" class="categoryScreen">

    <img class="categoryBtn" id="btn1" src="assets/titles/h.png">

    <img class="categoryBtn" id="btn2" src="assets/titles/k.png">

</div>

<div id="viewer" class="viewer"></div>
     
      </div>
    </div>
 <button id="infoBtn" class="infoBtn">i</button>

    <div id="infoPopup" class="infoPopup">

    <div class="infoBox">

          <p>
לפנייך בד"חים, בחר בחנית / קשת וגלול למטה ולמעלה לצפייה בכל הבד"חים.        </p>
                <button id="closeInfo">סגור</button>



    </div>

</div>
    <button id="menuBtn" class="menuBtn">

      <svg id="menuIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">

        <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />

      </svg>

    </button>

    <div id="overlay"></div>

    <nav id="sideMenu">

      <a href="index.html">דף הבית</a>

      <a href="page1.html">טעויות ירי</a>

      <a href="page2.html">מבחני הו"בים</a>

      <a href="page3.html">בד״חים</a>

      <a href="page4.html">צייר על המרגמה</a>

    </nav>
</body>
<script>
        window.addEventListener("load", () => {
    const hasVisited = localStorage.getItem("infoSeen");

    if (!hasVisited) {
        infoPopup.classList.add("show");
        localStorage.setItem("infoSeen", "true");
    }
});
  const menuBtn =
    document.getElementById("menuBtn");

  const sideMenu =
    document.getElementById("sideMenu");

  const overlay =
    document.getElementById("overlay");

  menuBtn.addEventListener("click", () => {

    sideMenu.classList.toggle("active");

    overlay.classList.toggle("active");

    menuBtn.classList.toggle("active");

  });

  overlay.addEventListener("click", closeMenu);

  function closeMenu() {

    sideMenu.classList.remove("active");

    overlay.classList.remove("active");

    menuBtn.classList.remove("active");
  }

  const albums = {

    btn1:[
        "assets/elements/h1.jpg",
        "assets/elements/h2.jpg",
        "assets/elements/h3.jpg",
        "assets/elements/h4.jpg",
        "assets/elements/h5.jpg",
        "assets/elements/h6.jpg",
        "assets/elements/h7.jpg",
        "assets/elements/h8.jpg",
    ],

    btn2:[
        "assets/elements/k1.jpg",
        "assets/elements/k2.jpg",
        "assets/elements/k3.jpg",
        "assets/elements/k4.jpg",
        "assets/elements/k5.jpg",
        "assets/elements/k6.jpg",
        "assets/elements/k7.jpg",
        "assets/elements/k8.jpg",
        "assets/elements/k9.jpg",
        "assets/elements/k10.jpg",
      
    ]

};

const categoryScreen=document.getElementById("categoryScreen");
const viewer=document.getElementById("viewer");

document.getElementById("btn1").onclick=()=>openAlbum("btn1");
document.getElementById("btn2").onclick=()=>openAlbum("btn2");

function openAlbum(name){

    categoryScreen.style.display="none";

    viewer.style.display="block";

    viewer.innerHTML="";

    albums[name].forEach(src=>{

        const img=document.createElement("img");

        img.src=src;

        viewer.appendChild(img);

    });

}

function openAlbum(name){

    if (navigator.vibrate) navigator.vibrate(20);

    categoryScreen.style.display="none";
    viewer.style.display="block";
    viewer.innerHTML="";

    albums[name].forEach(src=>{
        const img=document.createElement("img");
        img.src=src;
        viewer.appendChild(img);
    });
}

const infoBtn=document.getElementById("infoBtn");
const infoPopup=document.getElementById("infoPopup");
const closeInfo=document.getElementById("closeInfo");

infoBtn.onclick=()=>infoPopup.classList.add("show");
closeInfo.onclick=()=>infoPopup.classList.remove("show");

infoPopup.onclick=(e)=>{
    if(e.target===infoPopup){
        infoPopup.classList.remove("show");
    }
};
</script>


<div class="dots"></div>
</body>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    overflow-x: hidden;
    margin: 0;
    min-height: 100vh;
    background-image: url("assets/backgrounds/bg1.png");
    background-size: 100vw 100vh;
    background-position: center;
    background-repeat: repeat-y;
    direction: rtl;
    font-family: "secular";

  }



  .title {
    top: 20vh;
    width: min(70vw, 320px);
  }

:root{

    --menuColor:#EFFEFF;
    --menuOpenColor:#88b84d;

    --menuWidth:55vw;

}

/* ================= MENU BUTTON ================= */

.menuBtn{

    position:absolute;

    top:8vh;
    right:2vw;

    width:60px;
    height:60px;

    border:none;

    background:none;

    cursor:pointer;

    z-index:1001;
}

#menuIcon{

    width:100%;
    height:100%;

    fill:var(--menuColor);

    transition:.3s;
}

.menuBtn.active #menuIcon{

    fill:var(--menuOpenColor);
    
}

.menuBtn.active{
    display: none;
}


#sideMenu{

    position:fixed;

    top:0;
    right:-100%;

    width:var(--menuWidth);

    height:100vh;

    background:rgba(245,250,248,.95);

    backdrop-filter:blur(12px);

    border-radius:30px 0 0 30px;

    display:flex;

    flex-direction:column;

    padding-top:12vh;

    transition:.4s ease;

    z-index:100000;
}

#sideMenu.active{

    right:0;
}

#sideMenu a{

    text-decoration:none;

    color:#5d6940;

    font-size:1.8rem;

    font-weight: 580;

    padding:2vh 2vw;

    border-bottom:1px solid rgba(0,0,0,.08);

    transition:.25s;
}

#sideMenu a:hover{

    background:#dce7d0;
}

 .categoryScreen{
    position:absolute;
    top:35%;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:30px;
}

.categoryBtn{
    width:45vw;
    cursor:pointer;
}
.viewer{
    display:none;

    position:absolute;
    top:65%;
    left:50%;
    transform:translate(-50%,-50%);

    width:70vw;
    height:70vh;

    overflow-y:auto;
    scroll-snap-type:y mandatory;

}

.viewer::-webkit-scrollbar{
    display:none;
}

.viewer img{
    width:100%;
    height:80vh;

    object-fit:contain;

    scroll-snap-align:start;

    background: #effeff00;
}

.categoryBtn{
    width:45vw;
    cursor:pointer;

    transition:transform .18s ease,
               filter .18s ease,
               opacity .25s ease;
}

.categoryBtn:hover{
    transform:scale(1.05);
}

.categoryBtn:active{
    transform:scale(0.92);
}

.categoryBtn.clicked{
    transform:scale(0.88);
    opacity:0;
    filter:blur(4px);
}


.infoBtn{
    position:fixed;
    top:92%;
    left:15px;
    width:28px;
    height:28px;
    border-radius:50%;
    border:none;
    background:#516b42;
    color:white;
    font-size:1.5rem;
    z-index:200000;
}

.infoPopup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:3000;
}

.infoPopup.show{
    display:flex;
}

.infoBox{
    background:#effeffc5;
    padding:10px;
    border-radius:20px;
    width:60%;
    max-width:300px;
    color: #516b42;
    text-align:center;
    font-size: 1.2rem;
    
}

#closeInfo{
      background:#effeffc5;
    padding:2px;
    border-radius:20px;
    width:60%;
    max-width:300px;
    color: #516b42;
    border: none;
    text-align:center;
     box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
    font-size: 1.8rem;
    font-weight: 600;
    font-family: secular;
}

</style>
</html>
