<script>
        
  const menuBtn =
    document.getElementById("menuBtn");

  const sideMenu =
    document.getElementById("sideMenu");

  const overlay =
    document.getElementById("overlay");

  menuBtn.addEventListener("click", () => {

    sideMenu.classList.toggle("active");

    overlay.classList.toggle("active");

    menuBtn.classList.toggle("active");

  });

  overlay.addEventListener("click", closeMenu);

  function closeMenu() {

    sideMenu.classList.remove("active");

    overlay.classList.remove("active");

    menuBtn.classList.remove("active");
  }


</script>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    overflow-x: hidden;
    margin: 0;
    min-height: 100vh;
    background-image: url("assets/backgrounds/bg1.png");
    background-size: 100vw 100vh;
    background-position: center;
    background-repeat: repeat-y;
    direction: rtl;
    font-family: "secular";

  }

  .header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 90px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
    z-index: 1000;
  }


  .title {
    top: 20vh;
    width: min(70vw, 320px);
  }


  /* ===== DOTS ===== */
  .dots {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #bbb;
  }

  .dot.active {
    background: #222;
  }

  /* ===== MENU ===== */
  .menuBtn {
    position: fixed;
    top: 50px;
    right: 15px;
    width: 55px;
    height: 55px;
    background: none;
    border: none;
    z-index: 1100;
  }

  
  #sideMenu.active {
    right: 0;
  }


  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 1000;
  }

  #overlay.active {
    opacity: 1;
    pointer-events: all;
  }
#sideMenu a{

    text-decoration:none;

}

  #sideMenu {

    top: 0;

    height: 100vh;

<script type="module">
console.log("Firebase script התחיל");
import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import { 
getFirestore,
collection,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



// ===============================
// Firebase Config
// ===============================

const firebaseConfig = {
  apiKey: "AIzaSyB8S57Iqfi0p_1JgPlz2NT3upakyo-JYUc",
  authDomain: "margemhot.firebaseapp.com",
  databaseURL: "https://margemhot-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "margemhot",
  storageBucket: "margemhot.firebasestorage.app",
  messagingSenderId: "798968080375",
  appId: "1:798968080375:web:7e325f48fc16854bdb70f2",
  measurementId: "G-MXV3ZWYQ2H"
};



// אתחול Firebase

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);




// ===============================
// משתנים
// ===============================


let allResults = [];


const container =
document.getElementById("resultsContainer");




// ===============================
// טעינת מבחנים
// ===============================


async function loadResults(){


try{


const snapshot = await getDocs(
    collection(db,"testsResults")
);


console.log("מספר מבחנים:", snapshot.size);
allResults = [];



snapshot.forEach(item=>{

console.log(item.data());
allResults.push({

id:item.id,

...item.data()

});


});



displayResults(allResults);



}

catch(error){


console.error(
"שגיאה בטעינת מבחנים:",
error
);


}


}





// ===============================
// יצירת כרטיסיות
// ===============================


function displayResults(data){


container.innerHTML="";



if(data.length === 0){


container.innerHTML=`

<h2 style="text-align:center;color:#516b42">

לא נמצאו מבחנים

</h2>

`;


return;

}



data.forEach(result=>{



const card = document.createElement("div");


card.className="resultCard";



card.innerHTML=`

<h2>
${result.fullName || "ללא שם"}
</h2>


<p>
מספר אישי:
${result.personalNumber || "-"}
</p>



<p>
מבחן:
${result.testName || "-"}
</p>



<p>
ציון:
${result.score || 0}
</p>



<p>
תאריך:
${result.date || "-"}
</p>



<button class="deleteBtn">

מחיקת מבחן

</button>


`;





// כפתור מחיקה

card.querySelector(".deleteBtn")
.onclick = ()=>{

deleteResult(result.id);

};





container.appendChild(card);



});


}





// ===============================
// מחיקת מבחן
// ===============================


async function deleteResult(id){


let approve =
confirm("למחוק את המבחן?");



if(!approve)
return;



try{


await deleteDoc(
doc(db,"testsResults",id)
);



loadResults();



}

catch(error){


console.error(
"שגיאה במחיקה:",
error
);


}


}





// ===============================
// חיפוש
// ===============================


document
.getElementById("searchInput")
.addEventListener("input",e=>{


const value =
e.target.value.trim();



const filtered =
allResults.filter(item=>{


return (

(item.fullName || "")
.includes(value)

||

(item.personalNumber || "")
.includes(value)


);


});



displayResults(filtered);



});





// ===============================
// התחלה
// ===============================


loadResults();



</script>
