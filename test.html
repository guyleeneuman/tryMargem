// ===============================
// משתמש
// ===============================


const userName =
sessionStorage.getItem("fullName") || "לא נמצא";


const battalion =
sessionStorage.getItem("battalion") || "לא נמצא";


const testName =
sessionStorage.getItem("test");



console.log("TEST:",testName);




let currentTest = testsData[testName];



if(!currentTest){

alert(
"לא נמצא מבחן בשם: "+testName
);

throw new Error(
"Missing test data"
);

}



// ===============================
// משתנים
// ===============================


let currentQuestion=0;

let score=0;

let selectedAnswers=[];



const questionTitle =
document.getElementById("questionTitle");


const answersContainer =
document.getElementById("answersContainer");


const progressText =
document.getElementById("progressText");


const progressFill =
document.getElementById("progressFill");


const nextBtn =
document.getElementById("nextBtn");





// ===============================
// טעינת שאלה
// ===============================


function loadQuestion(){


selectedAnswers=[];


const q =
currentTest.questions[currentQuestion];



questionTitle.innerHTML =
q.question;



answersContainer.innerHTML="";



progressText.innerHTML=
`שאלה ${currentQuestion+1} מתוך ${currentTest.questions.length}`;



progressFill.style.width =
(
(currentQuestion /
currentTest.questions.length)*100
)+"%";



nextBtn.style.display="none";




// אמריקאי

if(q.type==="multiple"){


q.answers.forEach((answer,index)=>{


createAnswerButton(
answer,
()=>{


if(index===q.correct){

score+=10;

}


nextQuestion();


}

);


});


}





// נכון לא נכון

if(q.type==="trueFalse"){


createAnswerButton(
"נכון",
()=>{

if(q.correct===true)
score+=10;


nextQuestion();

});


createAnswerButton(
"לא נכון",
()=>{

if(q.correct===false)
score+=10;


nextQuestion();

});


}


if(q.type==="drag"){


    createDragQuestion(q);


}

if(q.type==="sentenceDrag"){

    createSentenceDrag(q);

}

// בחירה מרובה


if(q.type==="multipleMulti"){


q.answers.forEach((answer,index)=>{


let btn =
document.createElement("button");


btn.className="answerBtn";

btn.innerHTML=answer;


btn.onclick=()=>{


btn.classList.toggle("selected");


if(selectedAnswers.includes(index)){


selectedAnswers.splice(
selectedAnswers.indexOf(index),1
);


}

else{

selectedAnswers.push(index);

}


};


answersContainer.appendChild(btn);



});



nextBtn.style.display="block";


nextBtn.onclick=()=>{


let a=[...selectedAnswers].sort();

let b=[...q.correct].sort();



if(JSON.stringify(a)===JSON.stringify(b))
score+=10;



nextQuestion();


};



}



}





// ===============================
// כפתורי תשובות
// ===============================


function createAnswerButton(text,func){


let btn=document.createElement("button");


btn.className="answerBtn";

btn.innerHTML=text;


btn.onclick=func;


answersContainer.appendChild(btn);


}

function createDragQuestion(q){

    answersContainer.innerHTML="";


    let activeDrag = null;
    let ghost = null;





    const boxes=document.createElement("div");
    boxes.className="dropAreas";



    const warehouse=document.createElement("div");
    warehouse.className="warehouse";







    q.boxes.forEach(boxData=>{


        let box=document.createElement("div");


        box.className="dropBox";


        box.innerHTML=
        `<h3>${boxData.title}</h3>`;


        box.dataset.correct =
        JSON.stringify(boxData.correct);





        box.addEventListener(
            "pointerup",
            dropToBox
        );



        boxes.appendChild(box);



    });





    answersContainer.appendChild(boxes);







    q.items.forEach(item=>{


        createDragItem(
            item,
            warehouse
        );


    });



    answersContainer.appendChild(warehouse);










    function createDragItem(value,parent){


        let item=document.createElement("div");


        item.className="dragItem";


        item.innerHTML=value;


        item.dataset.value=value;



        item.addEventListener(
            "pointerdown",
            startDrag
        );



        parent.appendChild(item);


    }









    function startDrag(e){


        e.preventDefault();


        activeDrag=this;



        ghost=this.cloneNode(true);


        ghost.className=
        "dragGhost";



        document.body.appendChild(
            ghost
        );



        this.classList.add(
            "dragging"
        );



        moveGhost(e);



        document.addEventListener(
            "pointermove",
            moveDrag
        );



        document.addEventListener(
            "pointerup",
            endDrag
        );


    }









    function moveDrag(e){


        if(!ghost)
            return;


        moveGhost(e);


    }







    function moveGhost(e){


        ghost.style.left =
        e.clientX -
        ghost.offsetWidth/2
        +"px";



        ghost.style.top =
        e.clientY -
        ghost.offsetHeight/2
        +"px";


    }









    function endDrag(e){



        let target =
        document.elementFromPoint(
            e.clientX,
            e.clientY
        );



        let box =
        target?.closest(
            ".dropBox"
        );



        if(box){


            addToBox(
                box,
                activeDrag.dataset.value
            );


            removeItem(
                activeDrag
            );


        }





        finishDrag();


    }









    function dropToBox(e){


        if(!activeDrag)
            return;


        addToBox(
            this,
            activeDrag.dataset.value
        );


        removeItem(
            activeDrag
        );


        finishDrag();


    }










    function addToBox(box,value){



        let existing =
        [...box.querySelectorAll(
            ".placedItem"
        )]
        .find(
            x=>x.dataset.value===value
        );



        if(existing)
            return;






        let item=document.createElement("div");


        item.className="placedItem";


        item.innerHTML=value;


        item.dataset.value=value;





        item.addEventListener(
            "pointerdown",
            startDrag
        );



        box.appendChild(item);




        item.animate(
            [
                {
                    transform:"scale(.7)",
                    opacity:0
                },
                {
                    transform:"scale(1)",
                    opacity:1
                }
            ],
            {
                duration:200
            }
        );



    }










    function removeItem(item){


        if(item){

            item.remove();

        }


    }









    function finishDrag(){



        if(activeDrag){

            activeDrag.classList.remove(
                "dragging"
            );

        }



        if(ghost){

            ghost.remove();

            ghost=null;

        }



        document.removeEventListener(
            "pointermove",
            moveDrag
        );


        document.removeEventListener(
            "pointerup",
            endDrag
        );



        activeDrag=null;


    }










    nextBtn.style.display="block";



    nextBtn.onclick=()=>{


        let totalCorrect=0;

        let totalAnswers=0;





        document.querySelectorAll(
            ".dropBox"
        )
        .forEach(box=>{


            let correct=
            JSON.parse(
                box.dataset.correct
            );



            let placed=
            [
                ...box.querySelectorAll(
                    ".placedItem"
                )
            ]
            .map(
                x=>x.dataset.value
            );



            totalAnswers +=
            correct.length;



            correct.forEach(item=>{


                if(
                    placed.includes(item)
                ){

                    totalCorrect++;

                }


            });


        });





        score += Math.round(
            (
                totalCorrect /
                totalAnswers
            ) * 10
        );



        nextQuestion();


    };

}
function createSentenceDrag(q){

    answersContainer.innerHTML="";


    let activeDrag=null;
    let ghost=null;






    let sentenceBox=document.createElement("div");

    sentenceBox.className="sentence";




    let warehouse=document.createElement("div");

    warehouse.className="warehouse";







    q.sentence.forEach((text,index)=>{


        let span=document.createElement("span");


        span.innerHTML=text+" ";


        sentenceBox.appendChild(span);



        if(index < q.sentence.length-1){


            createDropPlace(index);


        }


    });





    answersContainer.appendChild(sentenceBox);







    function createDropPlace(index){



        let place=document.createElement("span");


        place.className="dropPlace";


        place.dataset.index=index;



        place.addEventListener(
            "pointerup",
            dropToPlace
        );



        sentenceBox.appendChild(place);


    }








    q.answers.forEach(word=>{


        createWord(
            word,
            warehouse
        );


    });



    answersContainer.appendChild(warehouse);









    function createWord(value,parent){



        let item=document.createElement("div");


        item.className=
        "dragItem sentenceItem";


        item.innerHTML=value;


        item.dataset.value=value;



        item.addEventListener(
            "pointerdown",
            startDrag
        );



        parent.appendChild(item);


    }









    function startDrag(e){


        e.preventDefault();



        activeDrag=this;



        activeDrag.oldParent =
        this.parentElement;



        activeDrag.oldIndex =
        [...this.parentElement.children]
        .indexOf(this);




        ghost=this.cloneNode(true);


        ghost.className=
        "dragGhost";



        document.body.appendChild(
            ghost
        );



        this.classList.add(
            "dragging"
        );



        moveGhost(e);



        document.addEventListener(
            "pointermove",
            moveDrag
        );



        document.addEventListener(
            "pointerup",
            endDrag
        );


    }









    function moveDrag(e){


        if(!ghost)
            return;


        moveGhost(e);


    }








    function moveGhost(e){



        ghost.style.left =
        e.clientX -
        ghost.offsetWidth/2
        +"px";



        ghost.style.top =
        e.clientY -
        ghost.offsetHeight/2
        +"px";


    }










    function endDrag(e){



        let target=
        document.elementFromPoint(
            e.clientX,
            e.clientY
        );



        let place=
        target?.closest(
            ".dropPlace"
        );



        if(place){


            dropToPlace.call(
                place
            );


        }
        else{


            returnBack();

        }




        finishDrag();


    }









    function dropToPlace(){


        let place=this;



        let value=
        activeDrag.dataset.value;



        let existing=
        place.dataset.value;





        // אם יש מילה במקום - החלפה

        if(existing){



            activeDrag.dataset.value =
            existing;



            activeDrag.innerHTML =
            existing;



            place.innerHTML =
            value;



            place.dataset.value =
            value;



            return;


        }







        // אם מגיע ממקום אחר במשפט

        if(
            activeDrag.parentElement.classList.contains(
                "sentence"
            )
        ){


            let oldPlace =
            activeDrag.parentElement;



            oldPlace.innerHTML="";


            oldPlace.dataset.value="";


        }







        place.innerHTML=value;


        place.dataset.value=value;



        activeDrag.remove();


    }









    function returnBack(){


        activeDrag.classList.remove(
            "dragging"
        );


        if(
            activeDrag.oldParent
        ){


            activeDrag.oldParent.appendChild(
                activeDrag
            );


        }


    }









    function finishDrag(){


        if(activeDrag){

            activeDrag.classList.remove(
                "dragging"
            );

        }



        if(ghost){

            ghost.remove();

            ghost=null;

        }



        document.removeEventListener(
            "pointermove",
            moveDrag
        );



        document.removeEventListener(
            "pointerup",
            endDrag
        );



        activeDrag=null;


    }









    nextBtn.style.display="block";



    nextBtn.onclick=()=>{



        let answers=[];



        document.querySelectorAll(
            ".dropPlace"
        )
        .forEach(place=>{


            answers.push(
                place.dataset.value || ""
            );


        });





        let correct=0;



        q.correct.forEach(
            (item,index)=>{


                if(
                    answers[index]===item
                ){

                    correct++;

                }


            }
        );





        score += Math.round(
            (
                correct /
                q.correct.length
            ) * 10
        );



        nextQuestion();


    };


}
