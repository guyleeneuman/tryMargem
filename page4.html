<script>
    window.addEventListener("load", () => {
    const hasVisited = localStorage.getItem("infoSeen");

    if (!hasVisited) {
        infoPopup.classList.add("show");
        localStorage.setItem("infoSeen", "true");
    }
    const img = document.getElementById("baseImage");

img.onload = () => {
    resizeCanvas();
};
});
  const menuBtn =
    document.getElementById("menuBtn");

  const sideMenu =
    document.getElementById("sideMenu");

  const overlay =
    document.getElementById("overlay");

  menuBtn.addEventListener("click", () => {

    sideMenu.classList.toggle("active");

    overlay.classList.toggle("active");

    menuBtn.classList.toggle("active");

  });

  overlay.addEventListener("click", closeMenu);

  function closeMenu() {

    sideMenu.classList.remove("active");

    overlay.classList.remove("active");

    menuBtn.classList.remove("active");
  }

 const canvas = document.getElementById("paintCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {

    const rect = canvas.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;

    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;

    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

    ctx.lineCap = "round";
    ctx.lineJoin = "round";
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let drawing = false;
let color = "#516b42";
let size = 5;
let erase = false;

function getPos(e) {
    return {
        x: e.offsetX,
        y: e.offsetY
    };
}

/* ---------- ציור ---------- */

function start(e) {

    e.preventDefault();

    drawing = true;

    const p = getPos(e);

    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
}

function draw(e) {

    if (!drawing) return;

    e.preventDefault();

    const p = getPos(e);

    ctx.globalCompositeOperation = erase
        ? "destination-out"
        : "source-over";

    ctx.strokeStyle = color;
    ctx.lineWidth = erase ? 25 : size;

    ctx.lineTo(p.x, p.y);
    ctx.stroke();
}

function stop() {

    drawing = false;
}

/* ---------- Pointer Events (עובד גם במחשב וגם באייפון) ---------- */

canvas.addEventListener("pointerdown", start);
canvas.addEventListener("pointermove", draw);
window.addEventListener("pointerup", stop);
window.addEventListener("pointercancel", stop);

/* ---------- צבע ---------- */

colorPicker.oninput = e => {

    erase = false;
    color = e.target.value;
};

/* ---------- מחק ---------- */

eraserBtn.onclick = () => {

    erase = true;
};

/* ---------- ניקוי ---------- */

clearBtn.onclick = () => {

    ctx.clearRect(0, 0, canvas.width, canvas.height);
};

/* ---------- שיתוף ---------- */

shareBtn.onclick = async () => {

    const out = document.createElement("canvas");

    out.width = canvas.width;
    out.height = canvas.height;

    const octx = out.getContext("2d");

    octx.fillStyle = "#fff";
    octx.fillRect(0, 0, out.width, out.height);

    const img = document.getElementById("baseImage");

    octx.drawImage(img, 0, 0, out.width, out.height);
    octx.drawImage(canvas, 0, 0);

    const blob = await new Promise(r => out.toBlob(r));

    const file = new File(
        [blob],
        "drawing.png",
        { type: "image/png" }
    );

    if (navigator.canShare) {

        navigator.share({

            files: [file],

            title: "הנה הציור שלי על המרגמה, אין על קורס מרגמות בביסלח!"

        });

    }

};

/* ---------- גודל עט ---------- */

const sizeBtn = document.getElementById("sizeBtn");
const sizePopup = document.getElementById("sizePopup");
const sizePicker = document.getElementById("sizePicker");
const sizeValue = document.getElementById("sizeValue");

sizeBtn.onclick = () => {

    sizePopup.classList.toggle("show");
};

sizePicker.oninput = e => {

    size = Number(e.target.value);
    sizeValue.textContent = size;
};

/* ---------- חלון מידע ---------- */

const infoBtn = document.getElementById("infoBtn");
const infoPopup = document.getElementById("infoPopup");
const closeInfo = document.getElementById("closeInfo");

infoBtn.onclick = () => infoPopup.classList.add("show");

closeInfo.onclick = () => infoPopup.classList.remove("show");

infoPopup.onclick = e => {

    if (e.target === infoPopup) {

        infoPopup.classList.remove("show");
    }
};
</script>
