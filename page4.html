<h1>הטבות שכריות</h1>
<p><strong>מענק נישואין-</strong>מענק המוזן לחייל הנשוי/ ידוע בציבור במערכות צה"ל.</p>
<p><strong>תווי קנייה-</strong>חייל המשרת ברמת פעילות ב' ומעלה והינו או הורה או חייל נשוי המשרת ברמת פעילות א' ומעלה ללא התניה בזכאות לתשמ"ש יהיה זכאי לתווי קנייה בסך 300 ש"ח כל חודש.</p>
<p><strong>תשלומי משפחה-</strong>חייל נשוי יהיה רשאי להגיש בקשה לתשלומי משפחה תשמ"ש בגין נישואיו. זכאות זו אינה אוטומטית ונבחנת בהתאם לקריטריונים של הטבת תשמ"ש. חייל נשוי הזכאי להטבת תשמ"ש זכאי ל50% הא"ד באופן אוטומטי.</p>

<p><strong>השתתפות בשכר דירה-</strong>חייל הנשוי השוכר דירה / משלם משכנתא ולא זכאי לתשמ"ש, יוכל להגיש בקשה להשתתפות בשכר דירה. תקרת הזכאות המקסימלית הינה 1149.20 ש"ח. חיילים נשואים בעלי זכאות לשכר דירה יהיו זכאים ל75% הא"ד בגובה 272.1 ש"ח.</p>
<p><strong>השתתפות הוצאות החזקת דירה-</strong>חייל נשוי זכאי ל50% הא"ד על סך 181.4 ש"ח גם במידה ואינו זכאי לשכר דירה או תשמ"ש. חייל שבבעלותו דירה על שמו, שעליה אינו משלם משכנתא ואינו משכיר דירה אחרת, יהיה זכאי ל100% הא"ד על סך 362.80%.</p>
<p><strong>החזרי גני ילדים-</strong>חייל חובה שהינו הורה לילד שילדו בטווח הגילאים 3 חודשים עד 5 שנים המשרתים ברמת פעילות ב' ומעלה זכאי להחזר גני ילדים. גובה ההחזר החודשי הינו 580 ש"ח עבור כל ילד. לבקשה זו החייל ידרש להציג את האישורים הבאים: קבלות בגין תשלום בפועל למסגרת + הצהרת הפרט.</p>
<h1>חופשות החייל הנשוי</h1>
<p><strong>חופשה לרגל הנישואין-</strong>זכאות ל10 ימי מיוחדת. ניתן לנצל את החופשה טרם מועד החתונה ועד שלושה חודשים לאחר מועד החתונה. עבור יום החתונה יש ליידע את המפקד.</p>
<p><strong>חופשה מיוחדת עקב הריון בת זוג-</strong>זכאות לחופשה עד 7 ימים בגין טיפולים / בדיקות הקשורים להריון בת זוגתו.</p>
<p><strong>חופשה מיוחדת עבור לידה / אימוץ-</strong>זכאות ל8 ימים. ניתן לנצל חופשה זו החל מחודש לפני מועד הלידה המשוער ועד כחודש אחרי.</p>
<p><strong>חופשה מיוחדת עקב טיפולי פוריות-</strong>לחייל 12 ימים, לחיילת 16 ימים.</p>
<p><strong>ליווי בן/בת הזוג לטיפול פוריות-</strong>זכאות לחופשה בת 5 ימים.</p>
<p><strong>חופשה מיוחדת עקב מחלת בן/בת הזוג-</strong>חייל אשר נאלץ להשאר בביתו לצורך טיפול בן / בת הזוג לאור מצב רפואי זכאי לחופשה של עד 6 ימים.</p>
<p><strong>מחלת ילד ומחלת ילד ממארת-</strong>חייל שהינו הורה לילד אשר נאלץ להשאר בביתו לצורך טיפול בילד בשל מצבו הרפואי, זכאי ל8 ימי חופשה לכל היותר בשנה. בנוסף, זכאי לחופשה של עד 60 ימים בגין מחלה ממארת של ילדו.</p>
<h1>הטבות נוספות</h1>
<p><strong>יום סידורים-</strong>חייל נשוי / ידוע בציבור המשרת ביחידה סגורה זכאי ליום סידורים אחת לחודש בהכשרה ראשונית ובשירותו הסדיר על חשבון המערכת. חייל נשוי/ ידוע בציבור שהינו הורה לילד- המשרת בכל רמות הפעילות, זכאי ליום סידורים אחת לחודש ובהכשרה ראשונית ובשירותו הסדיר על חשבון המערכת.</p>
<p><strong>הקלות בתנאי שירות-</strong>חייל שהינו נשוי והורה לילד זכאי להת"ש 3 ללא צורך בהבאת אישורים.</p>
<p><strong>תווי חג-</strong>חייל נשוי זכאי לתווי קנייה בסך 500 ש"ח בראש השנה ובפסח.</p>
<p><strong>הגעה מוקדמת הביתה-</strong>בערבי חג, ישוחררו חיילים נשואים כיום לפני החג עד השעה 17:30 לכל המאוחר.</p>
