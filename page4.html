<script>
  const menuBtn =
    document.getElementById("menuBtn");

  const sideMenu =
    document.getElementById("sideMenu");

  const overlay =
    document.getElementById("overlay");

  menuBtn.addEventListener("click", () => {

    sideMenu.classList.toggle("active");

    overlay.classList.toggle("active");

    menuBtn.classList.toggle("active");

  });

  overlay.addEventListener("click", closeMenu);

  function closeMenu() {

    sideMenu.classList.remove("active");

    overlay.classList.remove("active");

    menuBtn.classList.remove("active");
  }

 


const canvas=document.getElementById("paintCanvas");
const ctx=canvas.getContext("2d");

const area=document.querySelector(".drawArea");

function resizeCanvas(){

    canvas.width=canvas.offsetWidth;
    canvas.height=canvas.offsetHeight;

    ctx.lineCap="round";
    ctx.lineJoin="round";
}

resizeCanvas();

window.addEventListener("resize",resizeCanvas);

let drawing=false;

let color="#ff0000";

let size=5;

let erase=false;

ctx.lineCap="round";
ctx.lineJoin="round";

function getPos(e){

const rect=canvas.getBoundingClientRect();

const touch=e.touches?e.touches[0]:e;

return{

x:touch.clientX-rect.left,
y:touch.clientY-rect.top

};

}

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",draw);

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",draw);

window.addEventListener("mouseup",()=>drawing=false);
window.addEventListener("touchend",()=>drawing=false);

function start(e){

drawing=true;

const p=getPos(e);

ctx.beginPath();

ctx.moveTo(p.x,p.y);

}

function draw(e){

if(!drawing)return;

e.preventDefault();

const p=getPos(e);

ctx.strokeStyle=erase?"white":color;

ctx.lineWidth=size;

ctx.lineTo(p.x,p.y);

ctx.stroke();

}

colorPicker.oninput=e=>{

erase=false;

color=e.target.value;

};

eraserBtn.onclick=()=>{

erase=true;

ctx.lineWidth=25;

};
clearBtn.onclick=()=>{

ctx.clearRect(0,0,canvas.width,canvas.height);

};

shareBtn.onclick=async()=>{

const out=document.createElement("canvas");

out.width=canvas.width;
out.height=canvas.height;

const octx=out.getContext("2d");

const img=document.getElementById("baseImage");

octx.drawImage(img,0,0,out.width,out.height);

octx.drawImage(canvas,0,0);

const blob=await new Promise(r=>out.toBlob(r));

const file=new File([blob],"drawing.png",{type:"image/png"});

if(navigator.canShare){

navigator.share({

files:[file],
title:"ציור על המרגמה"

});

}

};

 const sizeBtn=document.getElementById("sizeBtn");
const sizePopup=document.getElementById("sizePopup");
const sizePicker=document.getElementById("sizePicker");
const sizeValue=document.getElementById("sizeValue");

sizeBtn.onclick=()=>{

    sizePopup.classList.toggle("show");

};

sizePicker.oninput=e=>{

    size=Number(e.target.value);

    sizeValue.textContent=size;

};
</script>


<div class="dots"></div>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    overflow-x: hidden;
    margin: 0;
    min-height: 100vh;
    background-image: url("assets/backgrounds/bg1.png");
    background-size: 100vw 100vh;
    background-position: center;
    background-repeat: repeat-y;
    direction: rtl;
    font-family: "secular";

  }



  .title {
    top: 20vh;
    width: min(70vw, 320px);
  }

:root{

    --menuColor:#EFFEFF;
    --menuOpenColor:#88b84d;

    --menuWidth:55vw;

}

/* ================= MENU BUTTON ================= */

.menuBtn{

    position:absolute;

    top:8vh;
    right:2vw;

    width:60px;
    height:60px;

    border:none;

    background:none;

    cursor:pointer;

    z-index:1001;
}

#menuIcon{

    width:100%;
    height:100%;

    fill:var(--menuColor);

    transition:.3s;
}

.menuBtn.active #menuIcon{

    fill:var(--menuOpenColor);
    
}

.menuBtn.active{
    display: none;
}


#sideMenu{

    position:fixed;

    top:0;
    right:-100%;

    width:var(--menuWidth);

    height:100vh;

    background:rgba(245,250,248,.95);

    backdrop-filter:blur(12px);

    border-radius:30px 0 0 30px;

    display:flex;

    flex-direction:column;

    padding-top:12vh;

    transition:.4s ease;

    z-index:100000;
}

#sideMenu.active{

    right:0;
}

#sideMenu a{

    text-decoration:none;

    color:#5d6940;

    font-size:1.8rem;

    font-weight: 580;

    padding:2vh 2vw;

    border-bottom:1px solid rgba(0,0,0,.08);

    transition:.25s;
}

#sideMenu a:hover{

}

 .categoryScreen{
    position:absolute;
    top:35%;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:30px;
}

.categoryBtn{
    width:45vw;
    cursor:pointer;
}
.viewer{
    display:none;

    position:absolute;
    top:65%;
    left:50%;
    transform:translate(-50%,-50%);

    width:70vw;
    height:70vh;

    overflow-y:auto;
    scroll-snap-type:y mandatory;

}

.viewer::-webkit-scrollbar{
    display:none;
}

.viewer img{
    width:100%;
    height:80vh;

    object-fit:contain;

    scroll-snap-align:start;

    background: #effeff00;
}

.categoryBtn{
    width:45vw;
    cursor:pointer;

    transition:transform .18s ease,
               filter .18s ease,
               opacity .25s ease;
}

.categoryBtn:hover{
    transform:scale(1.05);
}

.categoryBtn:active{
    transform:scale(0.92);
}

.categoryBtn.clicked{
    transform:scale(0.88);
    opacity:0;
    filter:blur(4px);
}
.drawArea{

    position:absolute;

    top:55%;

    left:50%;

    transform:translate(-50%,-50%);

    width:80vw;

    height:55vh;

    border-radius:20px;

    overflow:hidden;

    background:#effeffae;

    box-shadow:0 10px 25px rgba(0,0,0,.25);

}

#baseImage{

    position:absolute;

    width:100%;

    height:100%;

    object-fit:contain;

    pointer-events:none;
}

#paintCanvas{

    position:absolute;

    width:100%;

    height:100%;

    touch-action:none;
}

.toolbar{

    position:fixed;

    bottom:13px;

    left:50%;

    transform:translateX(-50%);

    display:flex;

    align-items:center;

    gap:6px;
